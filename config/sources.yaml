# Regulatory Enforcement Action Monitor — Source Registry
# Each source defines a regulator to check for new enforcement actions.
#
# Fields:
#   name:      Human-readable agency name (used in alerts and logs)
#   type:      "rss" or "html" — determines which scraper to use
#   url:       The URL to fetch
#   category:  federal_banking, federal_other, state_banking, state_insurance
#   selector:  CSS selector to find action links (html type only). null = not yet configured.
#   keywords:  List of terms to filter relevant entries. Empty = accept all.
#   enabled:   Set to false to skip this source during scraping.

# ============================================================================
# FEDERAL BANKING REGULATORS
# ============================================================================

- name: "OCC"
  type: rss
  url: "https://www.occ.treas.gov/rss/occ_news.xml"
  category: federal_banking
  selector: null
  keywords:
    - "enforcement"
    - "consent order"
    - "cease and desist"
    - "civil money penalty"
    - "formal agreement"
    - "prompt corrective action"
  enabled: true

- name: "OCC Enforcement Search"
  type: html
  url: "https://apps.occ.gov/EASearch"
  category: federal_banking
  selector: "table.table tbody tr"
  keywords: []
  enabled: true

- name: "FDIC"
