name: Daily Enforcement Action Check

on:
  schedule:
    - cron: '0 11 * * *'  # 6 AM ET (11:00 UTC) daily
  workflow_dispatch:       # Allow manual trigger from GitHub UI

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write      # Needed to commit updated DB

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browser
        run: playwright install --with-deps chromium

      - name: Run enforcement action monitor
        run: python main.py --with-browser

      - name: Commit updated database
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add seen_actions.db
          git diff --staged --quiet || git commit -m "Update seen actions DB [$(date -u +%Y-%m-%d)]"
          git push
